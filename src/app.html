<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- SVG favicon scales for any tab/bookmark size; .ico fallback covers
         older browsers; apple-touch-icon is what iOS uses for home-screen
         and share previews. ?v=N busts the prior EyeOcean-eye cache. -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg?v=7" />
    <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico?v=7" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png?v=7" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // testing eject: ?test flips umami's native kill switch for this
      // browser (persistent); ?test=0 rejoins. The tracker (injected in
      // +layout) checks localStorage before every send.
      try {
        var q = new URLSearchParams(location.search);
        if (q.has('test')) {
          q.get('test') === '0'
            ? localStorage.removeItem('umami.disabled')
            : localStorage.setItem('umami.disabled', '1');
        }
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
