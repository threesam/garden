<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="threesam menu">
  <title>threesam</title>
  <!-- Filled-ring approach: dark outer disk, smaller coin disk inside. Survives
       rasterization to 16 px better than a thin SVG stroke (which antialiases
       to invisibility at sub-pixel widths). 4 px ring in the 64 viewBox renders
       as 1 px at 16×16 — the minimum to read. -->
  <circle cx="32" cy="32" r="30" fill="#1a1a14"/>
  <circle cx="32" cy="32" r="26" fill="#e8a317"/>
  <rect x="21.5" y="26" width="21" height="3" rx="1.5" fill="#1a1a14"/>
  <rect x="21.5" y="36" width="21" height="3" rx="1.5" fill="#1a1a14"/>
</svg>
